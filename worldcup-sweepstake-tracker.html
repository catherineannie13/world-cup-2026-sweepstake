<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>World Cup 2026 Sweepstake — Live Tracker</title>
<style>
  :root{
    --bg:#0a0e27; --bg2:#131a4a; --gold:#ffd24a; --gold2:#ffb800; --green:#14e88a;
    --red:#ff4d6d; --blue:#4d8bff; --card:rgba(255,255,255,0.06); --bd:rgba(255,255,255,0.12);
    --text:#f4f6ff; --muted:#9aa3c7;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;color:var(--text);
    background:radial-gradient(circle at 15% 0%,rgba(255,210,74,.10),transparent 40%),
      radial-gradient(circle at 85% 100%,rgba(20,232,138,.10),transparent 40%),
      linear-gradient(160deg,var(--bg),var(--bg2));min-height:100vh;}
  .wrap{max-width:1200px;margin:0 auto;padding:20px 18px 80px}
  header.top{display:flex;flex-wrap:wrap;align-items:center;justify-content:space-between;gap:12px;padding:8px 0 4px}
  .ttl h1{font-size:clamp(22px,4vw,34px);font-weight:900;letter-spacing:-.5px;
    background:linear-gradient(90deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent}
  .ttl p{color:var(--muted);font-size:13px}
  .status{display:flex;align-items:center;gap:10px;font-size:13px;color:var(--muted)}
  .dot{width:9px;height:9px;border-radius:50%;background:var(--muted);box-shadow:0 0 0 0 rgba(20,232,138,.6)}
  .dot.live{background:var(--green);animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(20,232,138,.5)}70%{box-shadow:0 0 0 10px rgba(20,232,138,0)}100%{box-shadow:0 0 0 0 rgba(20,232,138,0)}}
  .btn{cursor:pointer;border:none;border-radius:10px;font-weight:700;font-size:13px;padding:9px 14px;
    background:rgba(255,255,255,.08);color:var(--text);border:1px solid var(--bd)}
  .btn:hover{background:rgba(255,255,255,.14)}

  .banner{background:linear-gradient(90deg,rgba(255,210,74,.16),rgba(20,232,138,.12));border:1px solid var(--bd);
    border-radius:14px;padding:14px 18px;margin:14px 0;text-align:center;font-weight:700}
  .banner b{color:var(--gold)}

  section{margin-top:22px}
  h2.sec{font-size:15px;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px}

  /* Leaderboard */
  .lb{width:100%;border-collapse:separate;border-spacing:0 8px}
  .lb th{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);text-align:center;padding:0 8px;font-weight:700}
  .lb th.l,.lb td.l{text-align:left}
  .lb td{background:var(--card);border-top:1px solid var(--bd);border-bottom:1px solid var(--bd);padding:12px 8px;text-align:center;font-size:14px}
  .lb td:first-child{border-left:1px solid var(--bd);border-radius:12px 0 0 12px}
  .lb td:last-child{border-right:1px solid var(--bd);border-radius:0 12px 12px 0}
  .lb tr.top td{background:linear-gradient(90deg,rgba(255,210,74,.16),var(--card));border-color:rgba(255,210,74,.4)}
  .rank{font-weight:900;font-size:18px;width:46px}
  .rank .medal{font-size:20px}
  .pl-name{font-weight:800;font-size:16px}
  .pts{font-weight:900;font-size:20px;color:var(--gold)}
  .alive-pill{display:inline-block;min-width:26px;padding:2px 8px;border-radius:999px;background:rgba(20,232,138,.16);color:var(--green);font-weight:800}
  .alive-pill.zero{background:rgba(255,77,109,.16);color:var(--red)}
  .muted{color:var(--muted)}

  /* Stat cards */
  .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:12px}
  .stat{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:14px}
  .stat .k{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);display:flex;align-items:center;gap:6px}
  .stat .v{font-size:20px;font-weight:900;margin-top:6px}
  .stat .s{font-size:12px;color:var(--muted);margin-top:2px}

  /* Player cards */
  .players{display:grid;grid-template-columns:repeat(4,1fr);gap:12px}
  .pcard{background:var(--card);border:1px solid var(--bd);border-radius:14px;padding:13px}
  .pcard .ph{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:10px}
  .pcard .ph .nm{font-weight:800;font-size:15px}
  .pcard .ph .pp{font-weight:900;color:var(--gold);font-size:15px}
  .trow{display:flex;align-items:center;gap:8px;padding:6px 6px;border-radius:8px;font-size:13px}
  .trow:nth-child(odd){background:rgba(0,0,0,.18)}
  .trow .fl{font-size:18px;width:24px;text-align:center}
  .trow .tn{flex:1;min-width:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .trow .rec{font-size:11px;color:var(--muted);font-variant-numeric:tabular-nums}
  .badge{font-size:9px;font-weight:800;padding:2px 6px;border-radius:6px;letter-spacing:.5px;text-transform:uppercase}
  .b-grp{background:rgba(77,139,255,.18);color:#9bc0ff}
  .b-ko{background:rgba(255,210,74,.18);color:var(--gold)}
  .b-out{background:rgba(255,77,109,.16);color:var(--red)}
  .b-champ{background:linear-gradient(90deg,var(--gold),var(--gold2));color:#1a1500}
  .trow.out{opacity:.5}

  /* Fixtures */
  .fxgrid{display:grid;grid-template-columns:1fr 1fr;gap:16px}
  .fx{background:var(--card);border:1px solid var(--bd);border-radius:10px;padding:9px 12px;margin-bottom:8px;font-size:13px;display:flex;align-items:center;gap:10px}
  .fx .dt{color:var(--muted);font-size:11px;width:74px;flex-shrink:0}
  .fx .mt{flex:1;display:flex;align-items:center;gap:6px;justify-content:center}
  .fx .sc{font-weight:800;font-variant-numeric:tabular-nums}
  .fx .own{font-size:10px;color:var(--gold);font-weight:700}
  .fx .vs{color:var(--muted);font-size:11px}
  .fx.clash{border-color:rgba(255,210,74,.45);background:linear-gradient(90deg,rgba(255,210,74,.10),var(--card))}
  .win{color:var(--green);font-weight:800}
  .empty{color:var(--muted);font-size:13px;padding:8px}

  footer{margin-top:30px;color:var(--muted);font-size:11px;text-align:center;line-height:1.7}
  footer code{background:rgba(0,0,0,.3);padding:1px 5px;border-radius:4px}
  @media(max-width:860px){.players{grid-template-columns:repeat(2,1fr)}.stats{grid-template-columns:1fr}.fxgrid{grid-template-columns:1fr}
    .lb .hide{display:none}}
</style>
</head>
<body>
<div class="wrap">
  <header class="top">
    <div class="ttl">
      <h1>🏆 World Cup 2026 — Sweepstake Tracker</h1>
      <p>8 players · 6 teams each · live from TheSportsDB</p>
    </div>
    <div class="status">
      <span class="dot" id="dot"></span><span id="updated">Loading…</span>
      <button class="btn" id="refresh">↻ Refresh</button>
    </div>
  </header>

  <div class="banner" id="banner">Loading live data…</div>

  <section>
    <h2 class="sec">🥇 Leaderboard</h2>
    <table class="lb">
      <thead><tr>
        <th>#</th><th class="l">Player</th><th>Points</th>
        <th>Alive</th><th class="hide">Played</th><th class="hide">W-D-L</th>
        <th>Goals</th><th class="hide">GD</th>
      </tr></thead>
      <tbody id="lbBody"></tbody>
    </table>
  </section>

  <section>
    <h2 class="sec">✨ Talking Points</h2>
    <div class="stats" id="statCards"></div>
  </section>

  <section>
    <h2 class="sec">👥 The Squads</h2>
    <div class="players" id="players"></div>
  </section>

  <section>
    <h2 class="sec">📅 Fixtures &amp; Results</h2>
    <div class="fxgrid">
      <div>
        <div style="font-weight:800;margin-bottom:8px">⏭️ Coming up</div>
        <div id="upcoming"></div>
      </div>
      <div>
        <div style="font-weight:800;margin-bottom:8px">✅ Recent results</div>
        <div id="recent"></div>
      </div>
    </div>
  </section>

  <footer id="foot"></footer>
</div>

<script>
/* ============================================================
   CONFIG
   ============================================================ */
const API_KEY = "3";                 // free public test key. Swap for a Patreon key for higher rate limits.
const LEAGUE_ID = 4429;              // FIFA World Cup
const SEASON = "2026";
const URL = `https://www.thesportsdb.com/api/v1/json/${API_KEY}/eventsseason.php?id=${LEAGUE_ID}&s=${SEASON}`;
const KICKOFF = new Date("2026-06-11T19:00:00");
const REFRESH_MS = 90000;

/* ============================================================
   ROSTERS (as drawn) + flags
   ============================================================ */
const FLAG = {
  "Netherlands":"🇳🇱","United States":"🇺🇸","Canada":"🇨🇦","Scotland":"🏴󠁧󠁢󠁳󠁣󠁴󠁿","Curaçao":"🇨🇼","Sweden":"🇸🇪",
  "Brazil":"🇧🇷","Colombia":"🇨🇴","Australia":"🇦🇺","Norway":"🇳🇴","Qatar":"🇶🇦","Haiti":"🇭🇹",
  "Argentina":"🇦🇷","Germany":"🇩🇪","Japan":"🇯🇵","Egypt":"🇪🇬","Jordan":"🇯🇴","Bosnia & Herzegovina":"🇧🇦",
  "France":"🇫🇷","Mexico":"🇲🇽","Ecuador":"🇪🇨","Paraguay":"🇵🇾","Ghana":"🇬🇭","New Zealand":"🇳🇿",
  "Belgium":"🇧🇪","Switzerland":"🇨🇭","Iran":"🇮🇷","Tunisia":"🇹🇳","Cape Verde":"🇨🇻","Turkey":"🇹🇷",
  "England":"🏴󠁧󠁢󠁥󠁮󠁧󠁿","Morocco":"🇲🇦","Austria":"🇦🇹","Ivory Coast":"🇨🇮","Saudi Arabia":"🇸🇦","DR Congo":"🇨🇩",
  "Portugal":"🇵🇹","Uruguay":"🇺🇾","Senegal":"🇸🇳","Panama":"🇵🇦","South Africa":"🇿🇦","Czechia":"🇨🇿",
  "Spain":"🇪🇸","Croatia":"🇭🇷","South Korea":"🇰🇷","Algeria":"🇩🇿","Uzbekistan":"🇺🇿","Iraq":"🇮🇶"
};
const ROSTERS = {
  "Catherine":["Netherlands","United States","Canada","Scotland","Curaçao","Sweden"],
  "Vlad":["Brazil","Colombia","Australia","Norway","Qatar","Haiti"],
  "Emma":["Argentina","Germany","Japan","Egypt","Jordan","Bosnia & Herzegovina"],
  "George":["France","Mexico","Ecuador","Paraguay","Ghana","New Zealand"],
  "Grandma":["Belgium","Switzerland","Iran","Tunisia","Cape Verde","Turkey"],
  "Carol":["England","Morocco","Austria","Ivory Coast","Saudi Arabia","DR Congo"],
  "Cheryl":["Portugal","Uruguay","Senegal","Panama","South Africa","Czechia"],
  "Tony":["Spain","Croatia","South Korea","Algeria","Uzbekistan","Iraq"]
};

/* Map an API team name to our canonical roster name */
const norm = s => (s||"").toLowerCase().normalize("NFD").replace(/[̀-ͯ]/g,"").replace(/[^a-z0-9]/g,"");
const CANON = {};
Object.keys(FLAG).forEach(c => CANON[norm(c)] = c);
[ // aliases: api spelling -> canonical
  ["usa","United States"],["unitedstatesofamerica","United States"],
  ["czechrepublic","Czechia"],
  ["bosnia","Bosnia & Herzegovina"],["bosniaandherzegovina","Bosnia & Herzegovina"],
  ["congodr","DR Congo"],["democraticrepublicofcongo","DR Congo"],["congodemocraticrepublic","DR Congo"],["drcongo","DR Congo"],
  ["cotedivoire","Ivory Coast"],
  ["turkiye","Turkey"],
  ["korearepublic","South Korea"],["republicofkorea","South Korea"],
  ["caboverde","Cape Verde"]
].forEach(([k,v]) => CANON[k] = v);
const resolve = name => CANON[norm(name)] || null;

const OWNER = {}; // canonical team -> player
Object.entries(ROSTERS).forEach(([p,ts]) => ts.forEach(t => OWNER[t] = p));

/* ============================================================
   FETCH + PROCESS
   ============================================================ */
let lastGood = null;
try { lastGood = JSON.parse(localStorage.getItem("wc26cache")||"null"); } catch(e){}

async function load(){
  setStatus(false, "Updating…");
  try{
    const res = await fetch(URL, {cache:"no-store"});
    if(!res.ok) throw new Error("HTTP "+res.status);
    const data = await res.json();
    const events = (data && data.events) || [];
    if(!events.length) throw new Error("no events");
    lastGood = {events, at:Date.now()};
    try{ localStorage.setItem("wc26cache", JSON.stringify(lastGood)); }catch(e){}
    render(events);
    setStatus(true, "Updated "+timeAgo(lastGood.at));
  }catch(err){
    if(lastGood){
      render(lastGood.events);
      setStatus(false, "Offline — showing cached ("+timeAgo(lastGood.at)+")");
    }else{
      document.getElementById('banner').innerHTML =
        "⚠️ Couldn't reach the football API and no cached data yet.<br>"+
        "<span class='muted'>Check your internet, or the tournament data may not be live yet. It auto-retries.</span>";
      setStatus(false, "No data");
    }
  }
}

function isFinished(ev){ return ev.intHomeScore!==null && ev.intHomeScore!=="" && ev.intAwayScore!==null && ev.intAwayScore!==""; }

function process(events){
  // base team stats
  const T = {};
  Object.keys(OWNER).forEach(t => T[t] = {team:t,owner:OWNER[t],P:0,W:0,D:0,L:0,GF:0,GA:0,pts:0,koBonus:0,
    alive:true,eliminated:false,champion:false,stage:"Group",lastResult:null});

  // classify knockout rounds by match count + date
  const koByRound = {};
  events.forEach(ev=>{
    const r = +ev.intRound;
    if(r>3){ (koByRound[r]=koByRound[r]||[]).push(ev); }
  });
  const roundMeta = {}; // intRound -> {name, advanceBonus, depth}
  const koRounds = Object.keys(koByRound).map(Number);
  // sort by earliest date so we can disambiguate final vs 3rd place (both 1 match)
  const minDate = r => Math.min(...koByRound[r].map(e=>+new Date(e.strTimestamp||e.dateEvent)));
  koRounds.sort((a,b)=>minDate(a)-minDate(b));
  koRounds.forEach(r=>{
    const n = koByRound[r].length;
    let name="Knockout", adv=5, depth=4;
    if(n>=16){name="Round of 32";adv=4;depth=4}
    else if(n>=8){name="Round of 16";adv=6;depth=5}
    else if(n>=4){name="Quarter-final";adv=9;depth=6}
    else if(n>=2){name="Semi-final";adv=13;depth=7}
    else { // 1 match: final or 3rd-place. The later one is the Final.
      const laterRounds = koRounds.filter(x=>koByRound[x].length===1);
      const isFinal = r===laterRounds[laterRounds.length-1];
      name = isFinal? "Final":"3rd Place"; adv = isFinal?20:3; depth = isFinal?9:8;
    }
    roundMeta[r] = {name,advanceBonus:adv,depth};
  });

  const teamsInKO = new Set();
  events.forEach(ev=>{ if(+ev.intRound>3){ [resolve(ev.strHomeTeam),resolve(ev.strAwayTeam)].forEach(t=>t&&teamsInKO.add(t)); } });

  // walk finished games
  events.slice().sort((a,b)=>new Date(a.strTimestamp||a.dateEvent)-new Date(b.strTimestamp||b.dateEvent)).forEach(ev=>{
    if(!isFinished(ev)) return;
    const h=resolve(ev.strHomeTeam), a=resolve(ev.strAwayTeam);
    const hs=+ev.intHomeScore, as=+ev.intAwayScore;
    const r=+ev.intRound, ko=r>3, meta=roundMeta[r];
    [[h,hs,as,a],[a,as,hs,h]].forEach(([t,gf,ga])=>{
      if(!t||!T[t]) return;
      const s=T[t]; s.P++; s.GF+=gf; s.GA+=ga;
      if(gf>ga){ s.W++; s.pts+=3; if(ko&&meta){ s.koBonus+=meta.advanceBonus; s.stage=meta.name; if(meta.name==="Final") s.champion=true; } }
      else if(gf===ga){ s.D++; s.pts+=1; if(ko) s.eliminated=true; /* draw in KO ~ lost on pens (data has no pen score) */ }
      else { s.L++; if(ko){ s.eliminated=true; } }
      s.lastResult={gf,ga,opp:( (t===h)?a:h ),round:meta?meta.name:("Group · MD"+r),date:ev.dateEvent,won:gf>ga,draw:gf===ga};
      if(ko && !s.eliminated && meta) s.stage=meta.name;
    });
  });

  // alive / eliminated resolution
  Object.values(T).forEach(s=>{
    if(s.champion){ s.alive=true; s.stage="Final"; return; }
    if(s.eliminated){ s.alive=false; return; }
    if(teamsInKO.size>0){ // bracket exists -> only KO teams survive group stage
      if(!teamsInKO.has(s.team)){ s.alive=false; s.eliminated=true; if(s.stage==="Group") s.stage="Group"; }
    }
  });

  // players
  const players = Object.keys(ROSTERS).map(name=>{
    const teams = ROSTERS[name].map(t=>T[t]);
    const agg = teams.reduce((o,s)=>{o.pts+=s.pts+s.koBonus;o.P+=s.P;o.W+=s.W;o.D+=s.D;o.L+=s.L;o.GF+=s.GF;o.GA+=s.GA;o.alive+=s.alive?1:0;return o;},
      {pts:0,P:0,W:0,D:0,L:0,GF:0,GA:0,alive:0});
    agg.name=name; agg.teams=teams; agg.GD=agg.GF-agg.GA;
    return agg;
  }).sort((a,b)=> b.pts-a.pts || b.GD-a.GD || b.GF-a.GF || b.alive-a.alive);

  return {T,players,events,roundMeta,anyFinished:events.some(isFinished)};
}

/* ============================================================
   RENDER
   ============================================================ */
function render(events){
  const M = process(events);
  renderBanner(M);
  renderLeaderboard(M);
  renderStats(M);
  renderPlayers(M);
  renderFixtures(M);
  document.getElementById('foot').innerHTML =
    `Data: TheSportsDB · league <code>${LEAGUE_ID}</code> season <code>${SEASON}</code> · auto-refreshes every ${REFRESH_MS/1000}s.<br>`+
    `Scoring: <b>3</b> per win, <b>1</b> per draw (all matches) + knockout bonus for advancing — R32 +4, R16 +6, QF +9, SF +13, Champion +20.`;
}

function renderBanner(M){
  const b=document.getElementById('banner');
  const now=new Date();
  if(!M.anyFinished && now<KICKOFF){
    const days=Math.ceil((KICKOFF-now)/86400000);
    b.innerHTML = `⚽ Tournament kicks off in <b>${days} day${days!==1?'s':''}</b> — first match <b>Mexico vs South Africa</b>, 11 June. Squads &amp; fixtures below; points start flowing once the games begin!`;
  }else{
    const lead=M.players[0];
    const champ=Object.values(M.T).find(s=>s.champion);
    if(champ){ b.innerHTML = `🏆 <b>${champ.team} are World Champions!</b> ${FLAG[champ.team]} — congratulations <b>${champ.owner}</b>!`; }
    else b.innerHTML = `🔥 <b>${lead.name}</b> leads with <b>${lead.pts}</b> pts · ${lead.alive} team${lead.alive!==1?'s':''} still standing`;
  }
}

function medal(i){ return i===0?'🥇':i===1?'🥈':i===2?'🥉':(i+1); }
function renderLeaderboard(M){
  document.getElementById('lbBody').innerHTML = M.players.map((p,i)=>`
    <tr class="${i===0?'top':''}">
      <td class="rank"><span class="medal">${medal(i)}</span></td>
      <td class="l pl-name">${p.name}</td>
      <td><span class="pts">${p.pts}</span></td>
      <td><span class="alive-pill ${p.alive===0?'zero':''}">${p.alive}/6</span></td>
      <td class="hide">${p.P}</td>
      <td class="hide muted">${p.W}-${p.D}-${p.L}</td>
      <td>${p.GF}<span class="muted" style="font-size:11px">:${p.GA}</span></td>
      <td class="hide ${p.GD>0?'win':p.GD<0?'':''}">${p.GD>0?'+':''}${p.GD}</td>
    </tr>`).join('');
}

function renderStats(M){
  const teams=Object.values(M.T);
  const cards=[];
  // top scoring player
  const topGoals=[...M.players].sort((a,b)=>b.GF-a.GF)[0];
  cards.push(['⚽ Most goals scored', `${topGoals.name}`, `${topGoals.GF} goals across their teams`]);
  // most teams alive
  const topAlive=[...M.players].sort((a,b)=>b.alive-a.alive||b.pts-a.pts)[0];
  cards.push(['💪 Most teams alive', `${topAlive.name}`, `${topAlive.alive} of 6 still in it`]);
  // star nation
  const starT=[...teams].sort((a,b)=>(b.pts+b.koBonus)-(a.pts+a.koBonus)||b.GF-a.GF)[0];
  cards.push(['⭐ Star nation', `${FLAG[starT.team]} ${starT.team}`, `${starT.pts+starT.koBonus} pts · owned by ${starT.owner}`]);
  // biggest win (roster team involved)
  let big=null;
  M.events.filter(isFinished).forEach(ev=>{
    const h=resolve(ev.strHomeTeam),a=resolve(ev.strAwayTeam); if(!h&&!a) return;
    const m=Math.abs(+ev.intHomeScore-+ev.intAwayScore);
    if(!big||m>big.m) big={m,ev,h,a};
  });
  if(big){ const e=big.ev;
    cards.push(['💥 Biggest win', `${e.strHomeTeam} ${e.intHomeScore}–${e.intAwayScore} ${e.strAwayTeam}`, `margin of ${big.m}`]);
  } else cards.push(['💥 Biggest win', '—', 'no matches played yet']);
  // tightest race / runner-up gap
  if(M.players.length>1){
    const gap=M.players[0].pts-M.players[1].pts;
    cards.push(['🏁 Lead margin', `${gap} pt${gap!==1?'s':''}`, `${M.players[0].name} over ${M.players[1].name}`]);
  }
  // next all-roster clash
  const clash=upcomingList(M).find(f=>f.h&&f.a);
  if(clash){ cards.push(['⚔️ Rival clash incoming', `${clash.ev.strHomeTeam} vs ${clash.ev.strAwayTeam}`, `${OWNER[clash.h]} vs ${OWNER[clash.a]} · ${fmtDate(clash.ev)}`]); }
  else cards.push(['🤝 Bottom watch', `${M.players[M.players.length-1].name}`, `${M.players[M.players.length-1].pts} pts — needs a hero`]);

  document.getElementById('statCards').innerHTML = cards.map(c=>`
    <div class="stat"><div class="k">${c[0]}</div><div class="v">${c[1]}</div><div class="s">${c[2]}</div></div>`).join('');
}

function teamBadge(s){
  if(s.champion) return '<span class="badge b-champ">🏆 Champion</span>';
  if(s.eliminated) return '<span class="badge b-out">Out</span>';
  if(s.stage && s.stage!=="Group") return `<span class="badge b-ko">${s.stage.replace('Round of','R')}</span>`;
  return '<span class="badge b-grp">Group</span>';
}
function renderPlayers(M){
  document.getElementById('players').innerHTML = M.players.map(p=>`
    <div class="pcard">
      <div class="ph"><span class="nm">${p.name}</span><span class="pp">${p.pts} pts</span></div>
      ${p.teams.map(s=>`
        <div class="trow ${s.eliminated?'out':''}">
          <span class="fl">${FLAG[s.team]}</span>
          <span class="tn">${s.team}</span>
          <span class="rec">${s.P?`${s.W}-${s.D}-${s.L}`:'–'}</span>
          ${teamBadge(s)}
        </div>`).join('')}
    </div>`).join('');
}

function fmtDate(ev){
  const d=new Date(ev.strTimestamp||ev.dateEvent);
  return d.toLocaleDateString(undefined,{month:'short',day:'numeric'})+' '+d.toLocaleTimeString(undefined,{hour:'2-digit',minute:'2-digit'});
}
function rosterFixture(ev){
  const h=resolve(ev.strHomeTeam),a=resolve(ev.strAwayTeam);
  if(!h&&!a) return null; return {ev,h,a};
}
function upcomingList(M){
  return M.events.filter(e=>!isFinished(e)).map(rosterFixture).filter(Boolean)
    .sort((x,y)=>new Date(x.ev.strTimestamp||x.ev.dateEvent)-new Date(y.ev.strTimestamp||y.ev.dateEvent));
}
function renderFixtures(M){
  const up=upcomingList(M).slice(0,8);
  const upEl=document.getElementById('upcoming');
  upEl.innerHTML = up.length? up.map(f=>fxRow(f,false)).join('') : '<div class="empty">No upcoming fixtures involving anyone\'s teams.</div>';

  const recent=M.events.filter(isFinished).map(rosterFixture).filter(Boolean)
    .sort((x,y)=>new Date(y.ev.strTimestamp||y.ev.dateEvent)-new Date(x.ev.strTimestamp||x.ev.dateEvent)).slice(0,8);
  const recEl=document.getElementById('recent');
  recEl.innerHTML = recent.length? recent.map(f=>fxRow(f,true)).join('') : '<div class="empty">No results yet — check back after 11 June.</div>';
}
function fxRow(f,done){
  const {ev,h,a}=f; const clash=h&&a;
  const own=t=> t?`<span class="own">${OWNER[t]}</span>`:'';
  const nm=(side,canon)=> `${own(canon)} ${FLAG[canon]||''} ${ev[side]}`.trim();
  let mid;
  if(done){
    const hs=+ev.intHomeScore, as=+ev.intAwayScore;
    const hw=hs>as, aw=as>hs;
    mid=`<span class="mt"><span class="${hw?'win':''}">${nm('strHomeTeam',h)}</span> <span class="sc">${hs}–${as}</span> <span class="${aw?'win':''}">${nm('strAwayTeam',a)}</span></span>`;
  }else{
    mid=`<span class="mt">${nm('strHomeTeam',h)} <span class="vs">v</span> ${nm('strAwayTeam',a)}</span>`;
  }
  return `<div class="fx ${clash?'clash':''}"><span class="dt">${fmtDate(ev)}</span>${mid}</div>`;
}

/* ============================================================
   STATUS / TIMERS
   ============================================================ */
function setStatus(live,txt){ document.getElementById('dot').className='dot'+(live?' live':''); document.getElementById('updated').textContent=txt; }
function timeAgo(ts){ const s=Math.round((Date.now()-ts)/1000); if(s<60)return 'just now'; const m=Math.round(s/60); if(m<60)return m+'m ago'; return Math.round(m/60)+'h ago'; }
document.getElementById('refresh').addEventListener('click', load);
load();
setInterval(load, REFRESH_MS);
</script>
</body>
